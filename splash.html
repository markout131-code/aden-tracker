<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Rajdhani:wght@500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#08080e;
  display:flex;align-items:center;justify-content:center;
  height:100vh;overflow:hidden;font-family:'Rajdhani',sans-serif;
}
.wrap{text-align:center;position:relative;animation:fadeIn .6s ease-out;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* Decorative rings */
.rings{position:relative;width:110px;height:110px;margin:0 auto 20px;}
.ring{position:absolute;border-radius:50%;border:1px solid;}
.ring1{inset:0;border-color:rgba(212,175,55,0.12);animation:spin1 8s linear infinite;}
.ring2{inset:8px;border-color:rgba(212,175,55,0.2);animation:spin1 5s linear infinite reverse;}
.ring3{inset:18px;border-color:rgba(212,175,55,0.35);animation:spin1 3s linear infinite;}
@keyframes spin1{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.sword-icon{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:42px;animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.8;transform:scale(.96)}}

/* Glow behind icon */
.glow{
  position:absolute;inset:0;
  background:radial-gradient(circle,rgba(212,175,55,0.08) 0%,transparent 70%);
  border-radius:50%;
}

.title{
  font-family:'Cinzel',serif;font-size:22px;font-weight:900;
  letter-spacing:5px;text-transform:uppercase;
  background:linear-gradient(135deg,#f0d060 0%,#d4af37 40%,#c0783a 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  margin-bottom:4px;
}
.subtitle{
  font-size:10px;font-weight:500;color:rgba(212,175,55,0.4);
  letter-spacing:3px;text-transform:uppercase;margin-bottom:28px;
}
/* Separator line */
.sep{
  width:180px;margin:0 auto 20px;height:1px;
  background:linear-gradient(90deg,transparent,rgba(212,175,55,0.4),transparent);
}

/* Loader track */
.loader-wrap{width:180px;margin:0 auto 12px;}
.loader-track{
  width:100%;height:2px;background:rgba(212,175,55,0.1);
  border-radius:10px;overflow:hidden;position:relative;
}
.loader-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,#d4af37,#f0d060,#c0783a);
  border-radius:10px;
  animation:load 2.2s ease-in-out infinite;
}
@keyframes load{0%{width:0%;opacity:1}70%{width:85%;opacity:1}100%{width:100%;opacity:0}}

.loading-txt{
  font-size:10px;font-weight:600;color:rgba(212,175,55,0.5);
  letter-spacing:3px;text-transform:uppercase;
}
.dots{display:inline-block;width:20px;text-align:left;}

.version{
  position:absolute;bottom:16px;left:0;right:0;text-align:center;
  color:rgba(212,175,55,0.2);font-size:9px;letter-spacing:2px;
}

/* Particle dots decoration */
.particles{position:fixed;inset:0;pointer-events:none;overflow:hidden;}
.p{position:absolute;width:2px;height:2px;background:#d4af37;border-radius:50%;opacity:0;animation:float linear infinite;}
@keyframes float{0%{opacity:0;transform:translateY(0)}10%{opacity:.6}90%{opacity:.1}100%{opacity:0;transform:translateY(-60px)}}
</style>
</head>
<body>
<div class="particles" id="particles"></div>
<div class="wrap">
  <div class="rings">
    <div class="glow"></div>
    <div class="ring ring1"></div>
    <div class="ring ring2"></div>
    <div class="ring ring3"></div>
    <div class="sword-icon">⚔️</div>
  </div>
  <div class="title">Aden Tracker</div>
  <div class="subtitle">Lineage 2 Event Tracker</div>
  <div class="sep"></div>
  <div class="loader-wrap">
    <div class="loader-track"><div class="loader-fill"></div></div>
  </div>
  <div class="loading-txt">Loading<span class="dots" id="dots">...</span></div>
</div>
<div class="version" id="ver">v1.2.2</div>
<script>
// Animated dots
let dc=0;const de=document.getElementById('dots');
setInterval(()=>{dc=(dc+1)%4;de.textContent='.'.repeat(dc);},500);

// Version from URL param
const ver=new URLSearchParams(window.location.search).get('version');
if(ver)document.getElementById('ver').textContent='v'+ver;

// Floating particles
const pc=document.getElementById('particles');
function spawnParticle(){
  const p=document.createElement('div');p.className='p';
  p.style.left=Math.random()*100+'%';
  p.style.bottom=Math.random()*30+'%';
  p.style.animationDuration=(3+Math.random()*4)+'s';
  p.style.animationDelay=Math.random()*2+'s';
  p.style.opacity='0';
  pc.appendChild(p);
  setTimeout(()=>p.remove(),(7000));
}
setInterval(spawnParticle,400);
</script>
</body>
</html>
