<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        
        .splash-container {
            text-align: center;
            animation: fadeIn 0.5s ease-in;
        }
        
        .logo {
            font-size: 64px;
            margin-bottom: 20px;
            animation: bounce 1s infinite;
        }
        
        .title {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(135deg, #ffd700 0%, #ffb347 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
            letter-spacing: 3px;
        }
        
        .subtitle {
            color: #888;
            font-size: 12px;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }
        
        .loader {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 215, 0, 0.2);
            border-top: 4px solid #ffd700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }
        
        .loading-text {
            color: #ffd700;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 2px;
        }
        
        .dots {
            display: inline-block;
            width: 30px;
            text-align: left;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .progress-bar {
            width: 200px;
            height: 2px;
            background: rgba(255, 215, 0, 0.2);
            border-radius: 10px;
            margin: 20px auto 0 auto;
            overflow: hidden;
        }
        
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ffb347);
            animation: loading 2s ease-in-out infinite;
            border-radius: 10px;
        }
        
        @keyframes loading {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }
        
        .version {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: #555;
            font-size: 10px;
        }
    </style>
</head>
<body>
    <div class="splash-container">
        <div class="logo">⚔️</div>
        <div class="title">ADEN TRACKER</div>
        <div class="subtitle">Lineage 2 Event Tracker</div>
        <div class="loader"></div>
        <div class="loading-text">
            LOADING<span class="dots">...</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        <div class="version" id="appVersion">v1.0.9</div>
    </div>
    
    <script>
        let dotsCount = 0;
        const dotsElement = document.querySelector('.dots');
        
        setInterval(() => {
            dotsCount = (dotsCount + 1) % 4;
            dotsElement.textContent = '.'.repeat(dotsCount);
        }, 500);
        
        // Πάρε την έκδοση από το URL (το στέλνει το main.js)
        const urlParams = new URLSearchParams(window.location.search);
        const version = urlParams.get('version');
        
        // Αν υπάρχει version στο URL, ενημέρωσε το version element
        if (version) {
            const versionElement = document.getElementById('appVersion');
            if (versionElement) {
                versionElement.textContent = `v${version}`;
            }
        }
    </script>
</body>
</html>
